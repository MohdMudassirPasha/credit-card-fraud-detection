# ---------------------------------------------------------------------------
# Local development / demo stack:
#   * api       — the FastAPI fraud-detection service
#   * dashboard — the Dash + Plotly analytics frontend
#   * mlflow    — the MLflow tracking UI
#
# Start everything with:  docker compose up --build
#   API serves on   http://localhost:8000 (docs at /docs)
#   Dashboard on    http://localhost:8050
#   MLflow UI on    http://localhost:5000
# ---------------------------------------------------------------------------
services:
  api:
    build: .
    image: credit-card-fraud-detection:latest
    container_name: fraud-api
    ports:
      - "8000:8000"
    volumes:
      # Mount artifacts so a model trained on the host is served by the API.
      - ./models:/app/models
      - ./reports:/app/reports
      - ./logs:/app/logs
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  dashboard:
    # Reuses the same image; only the start command differs.
    image: credit-card-fraud-detection:latest
    container_name: fraud-dashboard
    command: ["python", "-m", "dashboard.app"]
    ports:
      - "8050:8050"
    environment:
      - PYTHONUNBUFFERED=1
      # Reach the API by its service name on the compose network.
      - DASHBOARD_API_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.15.1
    container_name: fraud-mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    command: >
      mlflow server
      --backend-store-uri file:/mlruns
      --host 0.0.0.0
      --port 5000
    restart: unless-stopped
