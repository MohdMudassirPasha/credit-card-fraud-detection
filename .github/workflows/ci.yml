name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    name: Lint, test & smoke pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check src app dashboard tests main.py

      - name: Format check (black + isort)
        run: |
          black --check src app dashboard tests main.py
          isort --check-only src app dashboard tests main.py

      - name: Type check (mypy, non-blocking)
        run: mypy app dashboard
        continue-on-error: true

      - name: Run tests
        run: pytest --cov=src --cov=app --cov=dashboard --cov-report=term-missing

      - name: Smoke-test the training pipeline (synthetic data, fast subset)
        run: |
          python main.py --no-mlflow --models logistic_regression random_forest
        env:
          # Force the offline synthetic fallback in CI (no Kaggle credentials).
          PYTHONWARNINGS: ignore

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t credit-card-fraud-detection:ci .
